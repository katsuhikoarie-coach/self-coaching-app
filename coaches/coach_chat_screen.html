
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500&family=Shippori+Mincho:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body, .root {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    height: 100%;
  }

  .shell {
    display: flex;
    flex-direction: column;
    height: 600px;
    max-width: 480px;
    margin: 0 auto;
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: 20px;
    overflow: hidden;
  }

  /* ── header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
    flex-shrink: 0;
  }

  .back-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 0.5px solid var(--color-border-tertiary);
    background: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-text-secondary);
    font-size: 14px;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .back-btn:hover { background: var(--color-background-secondary); }

  .coach-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #EEEDFE;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    color: #534AB7;
    font-weight: 500;
  }

  .coach-info { flex: 1; min-width: 0; }

  .coach-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--color-text-primary);
    line-height: 1.3;
  }

  .coach-status {
    font-size: 11px;
    color: var(--color-text-tertiary);
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 1px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #1D9E75;
    flex-shrink: 0;
  }

  .phase-badge {
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 99px;
    background: #EEEDFE;
    color: #534AB7;
    flex-shrink: 0;
  }

  /* ── messages ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-thumb { background: var(--color-border-tertiary); border-radius: 2px; }

  .msg-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .msg-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #EEEDFE;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #534AB7;
    flex-shrink: 0;
    font-weight: 500;
  }

  .msg-avatar.user-av {
    background: var(--color-background-tertiary);
    color: var(--color-text-secondary);
  }

  .bubble {
    max-width: 78%;
    padding: 10px 13px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--color-text-primary);
  }

  .bubble.coach {
    background: var(--color-background-secondary);
    border-bottom-left-radius: 4px;
    border: 0.5px solid var(--color-border-tertiary);
  }

  .bubble.user {
    background: #534AB7;
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .bubble-time {
    font-size: 10px;
    color: var(--color-text-tertiary);
    margin-top: 4px;
    padding: 0 4px;
    align-self: flex-end;
  }

  .msg-col { display: flex; flex-direction: column; }
  .msg-col.user { align-items: flex-end; }

  /* typing indicator */
  .typing {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 10px 13px;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }

  .typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--color-text-tertiary);
    animation: blink 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.25; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ── suggestions ── */
  .suggestions {
    padding: 6px 14px 10px;
    display: flex;
    gap: 7px;
    overflow-x: auto;
    flex-shrink: 0;
  }
  .suggestions::-webkit-scrollbar { display: none; }

  .sug-chip {
    flex-shrink: 0;
    padding: 6px 12px;
    border-radius: 99px;
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-primary);
    font-size: 12px;
    color: var(--color-text-secondary);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    font-family: inherit;
  }
  .sug-chip:hover {
    background: #F5F3FE;
    border-color: #9F8FD4;
    color: #534AB7;
  }

  /* ── input ── */
  .input-area {
    padding: 10px 12px 14px;
    border-top: 0.5px solid var(--color-border-tertiary);
    display: flex;
    gap: 8px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .input-wrap {
    flex: 1;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: 14px;
    padding: 9px 12px;
    display: flex;
    align-items: flex-end;
    gap: 6px;
    transition: border-color 0.15s;
  }
  .input-wrap:focus-within { border-color: #9F8FD4; }

  .input-field {
    flex: 1;
    border: none;
    background: transparent;
    font-size: 14px;
    font-family: inherit;
    color: var(--color-text-primary);
    resize: none;
    outline: none;
    max-height: 100px;
    line-height: 1.5;
    min-height: 22px;
  }
  .input-field::placeholder { color: var(--color-text-tertiary); }

  .send-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: #534AB7;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.12s;
  }
  .send-btn:hover { background: #3C3489; }
  .send-btn:active { transform: scale(0.93); }
  .send-btn:disabled { background: var(--color-background-tertiary); color: var(--color-text-tertiary); cursor: default; }

  /* ── phase bar ── */
  .phase-bar {
    display: flex;
    gap: 4px;
    padding: 0 14px 0;
    flex-shrink: 0;
    align-items: center;
  }

  .phase-dot {
    flex: 1;
    height: 3px;
    border-radius: 2px;
    background: var(--color-border-tertiary);
    transition: background 0.3s;
  }
  .phase-dot.active { background: #534AB7; }
  .phase-dot.done { background: #9F8FD4; }

  .phase-label {
    font-size: 10px;
    color: var(--color-text-tertiary);
    padding: 4px 14px 8px;
    flex-shrink: 0;
  }

  /* ── crisis banner ── */
  .crisis-banner {
    display: none;
    margin: 0 14px 10px;
    padding: 10px 12px;
    background: #FCEBEB;
    border: 0.5px solid #F09595;
    border-radius: 10px;
    font-size: 12px;
    color: #A32D2D;
    line-height: 1.6;
  }

  .switch-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px 10px;
    flex-shrink: 0;
  }

  .switch-label {
    font-size: 11px;
    color: var(--color-text-tertiary);
  }

  .switch-btn {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 99px;
    border: 0.5px solid var(--color-border-tertiary);
    background: none;
    cursor: pointer;
    color: var(--color-text-secondary);
    font-family: inherit;
    transition: all 0.15s;
  }
  .switch-btn:hover {
    background: #F5F3FE;
    border-color: #9F8FD4;
    color: #534AB7;
  }
</style>

<div class="shell">

  <!-- header -->
  <div class="header">
    <button class="back-btn">←</button>
    <div class="coach-avatar">IFS</div>
    <div class="coach-info">
      <div class="coach-name">IFS コーチ</div>
      <div class="coach-status">
        <div class="dot"></div>
        内側の声と対話する
      </div>
    </div>
    <div class="phase-badge" id="phaseBadge">受容フェーズ</div>
  </div>

  <!-- phase progress -->
  <div style="padding: 10px 14px 0;">
    <div class="phase-bar" id="phaseBar"></div>
  </div>
  <div class="phase-label" id="phaseLabel">Phase 1 / 6 — 現実の受容</div>

  <!-- messages -->
  <div class="messages" id="messages"></div>

  <!-- suggestions -->
  <div class="suggestions" id="suggestions"></div>

  <!-- input -->
  <div class="input-area">
    <div class="input-wrap">
      <textarea class="input-field" id="inputField" placeholder="ここに話してください…" rows="1"></textarea>
    </div>
    <button class="send-btn" id="sendBtn">↑</button>
  </div>

</div>

<script>
const phases = [
  { label:'セットアップ', badge:'はじめに' },
  { label:'現実の受容', badge:'受容フェーズ' },
  { label:'理想の物語', badge:'ビジョン' },
  { label:'内なる声', badge:'対話フェーズ' },
  { label:'障害の特定', badge:'内省フェーズ' },
  { label:'統合', badge:'統合フェーズ' },
  { label:'行動', badge:'コミットメント' },
];

const scripts = [
  { phase:0, coach:'今日話したいことは何ですか？', sug:['仕事のこと','人間関係','自分のこと','漠然と不安'] },
  { phase:1, coach:'それはどんなことがあって、今そこにいるのですか？', sug:['もう少し話します','うまく言えないけど…','体に感じることがある'] },
  { phase:2, coach:'その話をしながら、今、体のどこかに何か感じますか？', sug:['胸が重い','お腹のあたり','喉が詰まる感じ'] },
  { phase:3, coach:'その「でも」の部分は、あなたに何を守らせようとしていると思いますか？', sug:['失敗が怖い','傷つきたくない','よくわからない'] },
  { phase:4, coach:'それは事実ですか？それとも解釈ですか？', sug:['解釈だと思う','事実だと思う','わからない'] },
  { phase:5, coach:'この体験を通じて、本当に大切にしたいものは何ですか？', sug:['自分らしさ','安心感','つながり'] },
  { phase:6, coach:'今日のセッションで自分に届けたい一言は？', sug:['もう少し考えます','言葉が出てきた'] },
];

let currentPhase = 0;
let msgCount = 0;

const messagesEl = document.getElementById('messages');
const inputField = document.getElementById('inputField');
const sendBtn = document.getElementById('sendBtn');
const sugEl = document.getElementById('suggestions');
const phaseBarEl = document.getElementById('phaseBar');
const phaseLabelEl = document.getElementById('phaseLabel');
const phaseBadgeEl = document.getElementById('phaseBadge');

function renderPhaseBar() {
  phaseBarEl.innerHTML = '';
  phases.forEach((p, i) => {
    const d = document.createElement('div');
    d.className = 'phase-dot' + (i < currentPhase ? ' done' : i === currentPhase ? ' active' : '');
    phaseBarEl.appendChild(d);
  });
  phaseLabelEl.textContent = `Phase ${currentPhase + 1} / ${phases.length} — ${phases[currentPhase].label}`;
  phaseBadgeEl.textContent = phases[currentPhase].badge;
}

function addMsg(text, role, animate) {
  const row = document.createElement('div');
  row.className = 'msg-row ' + (role === 'user' ? 'user' : '');

  const av = document.createElement('div');
  av.className = role === 'user' ? 'msg-avatar user-av' : 'msg-avatar';
  av.textContent = role === 'user' ? '在' : 'IFS';

  const col = document.createElement('div');
  col.className = 'msg-col ' + (role === 'user' ? 'user' : '');

  const bub = document.createElement('div');
  bub.className = 'bubble ' + (role === 'user' ? 'user' : 'coach');

  if (animate && role === 'coach') {
    bub.textContent = '';
    let i = 0;
    const interval = setInterval(() => {
      bub.textContent += text[i];
      i++;
      if (i >= text.length) clearInterval(interval);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }, 28);
  } else {
    bub.textContent = text;
  }

  const now = new Date();
  const time = document.createElement('div');
  time.className = 'bubble-time';
  time.textContent = now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');

  col.appendChild(bub);
  col.appendChild(time);
  row.appendChild(av);
  row.appendChild(col);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row';
  row.id = 'typingRow';

  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = 'IFS';

  const t = document.createElement('div');
  t.className = 'typing';
  t.innerHTML = '<span></span><span></span><span></span>';

  row.appendChild(av);
  row.appendChild(t);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function hideTyping() {
  const r = document.getElementById('typingRow');
  if (r) r.remove();
}

function renderSuggestions(list) {
  sugEl.innerHTML = '';
  list.forEach(s => {
    const c = document.createElement('button');
    c.className = 'sug-chip';
    c.textContent = s;
    c.addEventListener('click', () => {
      inputField.value = s;
      handleSend();
    });
    sugEl.appendChild(c);
  });
}

function handleSend() {
  const text = inputField.value.trim();
  if (!text) return;

  addMsg(text, 'user', false);
  inputField.value = '';
  inputField.style.height = 'auto';
  sendBtn.disabled = true;
  sugEl.innerHTML = '';

  showTyping();

  const delay = 900 + Math.random() * 600;
  setTimeout(() => {
    hideTyping();
    const next = currentPhase < scripts.length - 1 ? currentPhase + 1 : currentPhase;
    currentPhase = next;
    renderPhaseBar();
    const s = scripts[Math.min(currentPhase, scripts.length - 1)];
    addMsg(s.coach, 'coach', true);
    renderSuggestions(s.sug);
    sendBtn.disabled = false;
  }, delay);
}

sendBtn.addEventListener('click', handleSend);
inputField.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});
inputField.addEventListener('input', () => {
  inputField.style.height = 'auto';
  inputField.style.height = inputField.scrollHeight + 'px';
  sendBtn.disabled = !inputField.value.trim();
});

// init
sendBtn.disabled = true;
renderPhaseBar();
setTimeout(() => {
  addMsg(scripts[0].coach, 'coach', true);
  renderSuggestions(scripts[0].sug);
}, 400);
</script>
