
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500&family=Shippori+Mincho:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .wrap {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    padding: 2rem 1.25rem 3rem;
    max-width: 560px;
    margin: 0 auto;
  }

  .header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .header-label {
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--color-text-tertiary);
    margin-bottom: 0.6rem;
  }

  .header-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 24px;
    font-weight: 500;
    color: var(--color-text-primary);
    line-height: 1.5;
    margin-bottom: 0.6rem;
  }

  .header-sub {
    font-size: 13px;
    color: var(--color-text-secondary);
    line-height: 1.8;
  }

  /* mood chips */
  .mood-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--color-text-tertiary);
    margin-bottom: 0.65rem;
  }

  .mood-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-bottom: 2rem;
  }

  .chip {
    padding: 6px 13px;
    border-radius: 99px;
    border: 0.5px solid var(--color-border-tertiary);
    background: var(--color-background-primary);
    font-size: 12px;
    color: var(--color-text-secondary);
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .chip:hover { border-color: var(--color-border-secondary); color: var(--color-text-primary); }
  .chip.active { background: #F5F3FE; border-color: #9F8FD4; color: #534AB7; }

  /* coach cards */
  .coaches { display: flex; flex-direction: column; gap: 12px; margin-bottom: 1.75rem; }

  .coach-card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: 18px;
    padding: 1.25rem 1.25rem 1.1rem;
    cursor: pointer;
    transition: border-color 0.18s, background 0.15s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }
  .coach-card:hover { border-color: var(--color-border-secondary); transform: translateY(-1px); }
  .coach-card.selected { border: 1.5px solid #9F8FD4; background: #F9F8FF; }
  .coach-card.dimmed { opacity: 0.4; }

  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 0.85rem;
  }

  .coach-icon {
    width: 44px;
    height: 44px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .icon-teal   { background: #E1F5EE; }
  .icon-amber  { background: #FAEEDA; }
  .icon-purple { background: #EEEDFE; }

  .coach-head { flex: 1; }

  .coach-name {
    font-size: 16px;
    font-weight: 500;
    color: var(--color-text-primary);
    margin-bottom: 3px;
    line-height: 1.3;
  }

  .coach-tagline {
    font-size: 12px;
    color: var(--color-text-secondary);
    line-height: 1.5;
  }

  .match-badge {
    font-size: 10px;
    padding: 3px 9px;
    border-radius: 99px;
    background: #E1F5EE;
    color: #0F6E56;
    flex-shrink: 0;
    align-self: flex-start;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .match-badge.visible { opacity: 1; }

  /* methods */
  .methods {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 0.85rem;
  }

  .method-tag {
    font-size: 10px;
    padding: 3px 9px;
    border-radius: 6px;
    background: var(--color-background-tertiary);
    color: var(--color-text-tertiary);
  }

  .method-tag.lit {
    background: #EEEDFE;
    color: #534AB7;
  }

  /* scenes */
  .scene-label {
    font-size: 11px;
    color: var(--color-text-tertiary);
    margin-bottom: 5px;
  }

  .scenes {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .scene-chip {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 99px;
    border: 0.5px solid var(--color-border-tertiary);
    color: var(--color-text-secondary);
  }

  .scene-chip.lit {
    border-color: #9F8FD4;
    color: #534AB7;
    background: #F5F3FE;
  }

  /* start button */
  .start-btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: #534AB7;
    color: #fff;
    font-size: 15px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.18s, transform 0.12s;
    letter-spacing: 0.02em;
  }
  .start-btn:hover { background: #3C3489; }
  .start-btn:active { transform: scale(0.98); }
  .start-btn:disabled {
    background: var(--color-background-tertiary);
    color: var(--color-text-tertiary);
    cursor: default;
  }

  .start-note {
    text-align: center;
    font-size: 11px;
    color: var(--color-text-tertiary);
    margin-top: 0.6rem;
  }
</style>

<div class="wrap">
  <div class="header">
    <div class="header-label">セルフコーチング</div>
    <div class="header-title">今日、どのコーチと話しますか？</div>
    <div class="header-sub">今の気持ちを選ぶと、合うコーチが光ります。<br>直感で選んでも、大丈夫です。</div>
  </div>

  <div class="mood-label">今の気持ちは？</div>
  <div class="mood-chips" id="moodChips">
    <button class="chip" data-mood="もやもや">もやもやしている</button>
    <button class="chip" data-mood="ループ">頭がぐるぐるする</button>
    <button class="chip" data-mood="両価">したいけど怖い</button>
    <button class="chip" data-mood="関係">人間関係で悩んでいる</button>
    <button class="chip" data-mood="決断">決められない</button>
    <button class="chip" data-mood="行動">具体的に動きたい</button>
    <button class="chip" data-mood="物語">自分の見方を変えたい</button>
    <button class="chip" data-mood="過去">昔からそうだ</button>
  </div>

  <div class="coaches" id="coachList"></div>

  <button class="start-btn" id="startBtn" disabled>コーチを選んでください</button>
  <div class="start-note">途中でコーチを変えることもできます</div>
</div>

<script>
const coaches = [
  {
    id: 'narrative',
    icon: '◎',
    iconClass: 'icon-amber',
    name: 'ナラティブコーチ',
    tagline: '自分の物語を、書き直す',
    methods: ['アドラー', 'NLP', 'CBT', 'IFS', 'ACT', 'ナラティブ'],
    speciality: ['ナラティブ'],
    scenes: ['自分はいつもこうだ', '物語を書き換えたい', '過去の意味づけを変えたい', '新しい自己像を探している'],
    moods: ['もやもや', '物語', '関係', '両価'],
  },
  {
    id: 'grow',
    icon: '▲',
    iconClass: 'icon-teal',
    name: 'GROWコーチ',
    tagline: '目標を決めて、動き出す',
    methods: ['アドラー', 'NLP', 'CBT', 'IFS', 'ACT', 'GROW/WOOP'],
    speciality: ['GROW/WOOP'],
    scenes: ['具体的に動きたい', '計画を立てたい', '行動を決めたい', 'セッションを締めたい'],
    moods: ['行動', '両価', 'ループ'],
  },
  {
    id: 'position',
    icon: '◈',
    iconClass: 'icon-purple',
    name: 'ポジションチェンジコーチ',
    tagline: '視点を変えると、見えてくる',
    methods: ['アドラー', 'NLP', 'CBT', 'IFS', 'ACT', 'ポジションチェンジ'],
    speciality: ['ポジションチェンジ'],
    scenes: ['決められない', '昔からそうだ', '人間関係で行き詰まっている', '視点を動かしたい'],
    moods: ['決断', '過去', '関係', 'もやもや'],
  },
];

let selectedMoods = [];
let selectedCoach = null;

function render() {
  const list = document.getElementById('coachList');
  list.innerHTML = '';

  coaches.forEach(c => {
    const matched = selectedMoods.length === 0 || selectedMoods.some(m => c.moods.includes(m));
    const card = document.createElement('div');
    card.className = 'coach-card' +
      (selectedCoach === c.id ? ' selected' : '') +
      (!matched && selectedMoods.length > 0 ? ' dimmed' : '');

    const matchCount = selectedMoods.filter(m => c.moods.includes(m)).length;

    card.innerHTML = `
      <div class="card-top">
        <div class="coach-icon ${c.iconClass}">${c.icon}</div>
        <div class="coach-head">
          <div class="coach-name">${c.name}</div>
          <div class="coach-tagline">${c.tagline}</div>
        </div>
        <div class="match-badge ${matchCount > 0 ? 'visible' : ''}">おすすめ</div>
      </div>
      <div class="methods">
        ${c.methods.map(m => `<span class="method-tag ${c.speciality.includes(m) ? 'lit' : ''}">${m}</span>`).join('')}
      </div>
      <div class="scene-label">こんなとき</div>
      <div class="scenes">
        ${c.scenes.map(s => {
          const isLit = selectedMoods.length > 0 && c.moods.some(m => selectedMoods.includes(m));
          return `<span class="scene-chip ${isLit ? 'lit' : ''}">${s}</span>`;
        }).join('')}
      </div>
    `;

    card.addEventListener('click', () => {
      selectedCoach = c.id;
      const btn = document.getElementById('startBtn');
      btn.disabled = false;
      btn.textContent = `${c.name} とセッションを始める →`;
      render();
    });

    list.appendChild(card);
  });
}

document.getElementById('moodChips').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  const mood = chip.dataset.mood;
  if (selectedMoods.includes(mood)) {
    selectedMoods = selectedMoods.filter(m => m !== mood);
    chip.classList.remove('active');
  } else {
    selectedMoods.push(mood);
    chip.classList.add('active');
  }
  render();
});

document.getElementById('startBtn').addEventListener('click', () => {
  if (!selectedCoach) return;
  const c = coaches.find(x => x.id === selectedCoach);
  sendPrompt(`${c.name}でセッションを始めます。`);
});

render();
</script>
