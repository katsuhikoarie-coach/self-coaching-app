name: 毎朝情報収集メール

on:
  schedule:
    # 毎日 UTC 0:00 = JST 9:00
    - cron: '0 0 * * *'
  # 手動実行も可能（テスト用）
  workflow_dispatch:

jobs:
  send-daily-info:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 依存パッケージのインストール
        run: pip install -r requirements.txt

      - name: 毎朝情報収集スクリプトを実行
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          MAIL_TO:        ${{ secrets.MAIL_TO }}
        run: python daily_info.py
