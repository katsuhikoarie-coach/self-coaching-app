<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音声入力</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: #f5f3ee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    color: #2a2a2a;
  }
  .container {
    width: 100%;
    max-width: 640px;
  }
  h1 {
    font-size: 1.1rem;
    font-weight: 500;
    color: #666;
    letter-spacing: 0.1em;
    margin-bottom: 2rem;
    text-align: center;
  }
  .mic-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
    margin-bottom: 2rem;
  }
  .mic-btn {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    border: none;
    background: #2a2a2a;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    position: relative;
  }
  .mic-btn:hover { background: #444; transform: scale(1.05); }
  .mic-btn.recording {
    background: #c0392b;
    animation: pulse 1.2s infinite;
  }
  .mic-btn svg { width: 36px; height: 36px; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(192,57,43,0.4); }
    50% { box-shadow: 0 0 0 16px rgba(192,57,43,0); }
  }
  .status {
    font-size: 0.9rem;
    color: #999;
    min-height: 1.4em;
    text-align: center;
  }
  .status.active { color: #c0392b; }
  .text-area {
    width: 100%;
    background: #fff;
    border: 1px solid #e0ddd6;
    border-radius: 12px;
    padding: 1.25rem;
    min-height: 180px;
    font-size: 1rem;
    line-height: 1.8;
    color: #2a2a2a;
    resize: vertical;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  .text-area:focus { border-color: #999; }
  .text-area.placeholder-active { color: #bbb; }
  .actions {
    display: flex;
    gap: 0.75rem;
    margin-top: 1rem;
  }
  .btn {
    flex: 1;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    border: 1px solid #d0cdc6;
    background: #fff;
    color: #444;
    cursor: pointer;
    font-size: 0.9rem;
    font-family: inherit;
    transition: all 0.15s;
  }
  .btn:hover { background: #f0ede8; }
  .btn.copy { background: #2a2a2a; color: #fff; border-color: #2a2a2a; }
  .btn.copy:hover { background: #444; }
  .notice {
    margin-top: 2rem;
    font-size: 0.8rem;
    color: #aaa;
    text-align: center;
    line-height: 1.6;
  }
  .interim {
    color: #aaa;
    font-style: italic;
  }
</style>
</head>
<body>
<div class="container">
  <h1>音声入力</h1>

  <div class="mic-area">
    <button class="mic-btn" id="micBtn" onclick="toggleRecording()" aria-label="マイクボタン">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="12" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="8" y1="22" x2="16" y2="22"/>
      </svg>
    </button>
    <p class="status" id="status">タップして話しかけてください</p>
  </div>

  <textarea class="text-area" id="output" placeholder="ここに文字が入ります..." readonly></textarea>

  <div class="actions">
    <button class="btn" onclick="clearText()">クリア</button>
    <button class="btn copy" onclick="copyText()">コピー</button>
  </div>

  <p class="notice">Chrome / Edge でご使用ください<br>マイクの使用許可が必要です</p>
</div>

<script>
let recognition = null;
let isRecording = false;
let finalText = '';

function init() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById('status').textContent = 'このブラウザは非対応です（Chromeをお使いください）';
    document.getElementById('micBtn').disabled = true;
    return;
  }
  recognition = new SpeechRecognition();
  recognition.lang = 'ja-JP';
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('status').textContent = '聞いています...';
    document.getElementById('status').classList.add('active');
  };

  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        finalText += e.results[i][0].transcript;
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    const out = document.getElementById('output');
    out.value = finalText + (interim ? interim : '');
  };

  recognition.onerror = (e) => {
    let msg = '認識エラー';
    if (e.error === 'not-allowed') msg = 'マイクの使用が許可されていません';
    if (e.error === 'no-speech') msg = '音声が検出されませんでした';
    document.getElementById('status').textContent = msg;
    stopRecording();
  };

  recognition.onend = () => {
    if (isRecording) {
      recognition.start();
    } else {
      document.getElementById('micBtn').classList.remove('recording');
      document.getElementById('status').textContent = 'タップして話しかけてください';
      document.getElementById('status').classList.remove('active');
    }
  };
}

function toggleRecording() {
  if (!recognition) return;
  if (isRecording) {
    stopRecording();
  } else {
    finalText = document.getElementById('output').value;
    recognition.start();
  }
}

function stopRecording() {
  isRecording = false;
  if (recognition) recognition.stop();
}

function clearText() {
  finalText = '';
  document.getElementById('output').value = '';
}

function copyText() {
  const text = document.getElementById('output').value;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn.copy');
    btn.textContent = 'コピー完了！';
    setTimeout(() => btn.textContent = 'コピー', 1500);
  });
}

init();
</script>
</body>
</html>
