services:
  - type: web
    name: self-coaching-app
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: pip install -r backend/requirements.txt && cd backend && python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
