<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パスワード管理 | 朝霧ヤマノ</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #ffffff;
    color: #333;
    font-size: 14px;
  }

  header {
    background: #78350f;
    color: #fff;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  header h1 { font-size: 18px; font-weight: bold; }
  header span { font-size: 13px; opacity: 0.75; }

  .container { max-width: 1100px; margin: 0 auto; padding: 16px 12px 40px; }

  /* サマリー */
  .summary {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .summary-card {
    background: #fafaf9;
    border: 1px solid #e7e5e4;
    border-radius: 8px;
    padding: 10px 16px;
    min-width: 100px;
    text-align: center;
  }
  .summary-card .label { font-size: 11px; color: #78716c; }
  .summary-card .count { font-size: 24px; font-weight: bold; color: #292524; margin-top: 2px; }

  /* コントロールバー */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 12px;
    align-items: center;
  }
  .controls input[type="text"] {
    border: 1px solid #d6d3d1;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    width: 200px;
    outline: none;
  }
  .controls input[type="text"]:focus { border-color: #b45309; box-shadow: 0 0 0 2px #fef3c7; }

  .filter-btn {
    border: 1px solid #d6d3d1;
    background: #fff;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .filter-btn:hover { background: #f5f5f4; }
  .filter-btn.active { background: #78350f; color: #fff; border-color: #78350f; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: #b45309; color: #fff; }
  .btn-secondary { background: #e7e5e4; color: #44403c; }
  .btn-success { background: #15803d; color: #fff; }
  .btn-danger { background: #dc2626; color: #fff; }
  .btn-sm { padding: 4px 8px; font-size: 12px; }
  .btn-icon { padding: 4px 6px; background: none; border: 1px solid #d6d3d1; border-radius: 5px; cursor: pointer; font-size: 14px; line-height: 1; }
  .btn-icon:hover { background: #f5f5f4; }

  /* テーブル */
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    background: #f5f5f4;
    border: 1px solid #e7e5e4;
    padding: 8px 10px;
    text-align: left;
    font-weight: 600;
    color: #57534e;
    white-space: nowrap;
  }
  tbody td {
    border: 1px solid #e7e5e4;
    padding: 8px 10px;
    vertical-align: middle;
  }
  tbody tr:hover { background: #fafaf9; }

  .pw-cell { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .pw-text { font-family: monospace; letter-spacing: 0.03em; }

  /* バッジ */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-fc   { background: #dbeafe; color: #1d4ed8; }
  .badge-bc   { background: #dcfce7; color: #15803d; }
  .badge-hansha { background: #ffedd5; color: #c2410c; }

  .action-cell { display: flex; gap: 4px; white-space: nowrap; }

  /* モーダル */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 12px;
    padding: 24px;
    width: 100%;
    max-width: 460px;
    margin: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal h2 { font-size: 16px; font-weight: bold; margin-bottom: 18px; }
  .form-row { margin-bottom: 14px; }
  .form-row label { display: block; font-size: 12px; color: #57534e; margin-bottom: 4px; font-weight: 500; }
  .form-row input[type="text"],
  .form-row input[type="email"],
  .form-row input[type="password"],
  .form-row select,
  .form-row textarea {
    width: 100%;
    border: 1px solid #d6d3d1;
    border-radius: 7px;
    padding: 8px 10px;
    font-size: 13px;
    outline: none;
    font-family: inherit;
  }
  .form-row input:focus,
  .form-row select:focus,
  .form-row textarea:focus { border-color: #b45309; box-shadow: 0 0 0 2px #fef3c7; }
  .pw-input-wrap { position: relative; }
  .pw-input-wrap input { padding-right: 2.8rem; }
  .pw-toggle {
    position: absolute;
    right: 0.5rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1.1rem;
    line-height: 1;
    padding: 0;
    color: #999;
  }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

  /* トースト */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #292524;
    color: #fff;
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 200;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .empty { text-align: center; padding: 40px; color: #a8a29e; }

  @media (max-width: 600px) {
    header h1 { font-size: 15px; }
    .controls input[type="text"] { width: 100%; }
    table { font-size: 12px; }
    thead th, tbody td { padding: 6px 7px; }
  }
</style>
</head>
<body>

<header>
  <span style="font-size:22px;">🌿</span>
  <div>
    <h1>パスワード管理</h1>
    <span>朝霧ヤマノ センター受注システム</span>
  </div>
</header>

<div class="container">

  <!-- サマリー -->
  <div class="summary" id="summary"></div>

  <!-- コントロール -->
  <div class="controls">
    <input type="text" id="searchInput" placeholder="🔍 名前・センター・メール検索" oninput="render()">
    <button type="button" class="filter-btn active" data-type="all" onclick="setFilter('all')">すべて</button>
    <button type="button" class="filter-btn" data-type="FC"  onclick="setFilter('FC')">FC</button>
    <button type="button" class="filter-btn" data-type="BC"  onclick="setFilter('BC')">BC</button>
    <button type="button" class="filter-btn" data-type="販社" onclick="setFilter('販社')">販社</button>
    <button type="button" class="btn btn-primary" onclick="openModal()">＋ ユーザー追加</button>
    <button type="button" class="btn btn-success" onclick="downloadCSV()">↓ CSV</button>
  </div>

  <!-- テーブル -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>担当者名</th>
          <th>センター名</th>
          <th>種別</th>
          <th>メールアドレス</th>
          <th>パスワード</th>
          <th>備考</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<!-- モーダル -->
<div class="modal-overlay" id="modalOverlay" onclick="overlayClick(event)">
  <div class="modal">
    <h2 id="modalTitle">ユーザー追加</h2>
    <form onsubmit="saveUser(event)">
      <input type="hidden" id="editId">
      <div class="form-row">
        <label>担当者名 <span style="color:red">*</span></label>
        <input type="text" id="fName" required placeholder="例：山田 花子">
      </div>
      <div class="form-row">
        <label>センター名 <span style="color:red">*</span></label>
        <input type="text" id="fCenter" required placeholder="例：西明石センター">
      </div>
      <div class="form-row">
        <label>種別 <span style="color:red">*</span></label>
        <select id="fType" required>
          <option value="FC">FC</option>
          <option value="BC">BC</option>
          <option value="販社">販社</option>
        </select>
      </div>
      <div class="form-row">
        <label>メールアドレス <span style="color:red">*</span></label>
        <input type="email" id="fEmail" required placeholder="例：yamada@gmail.com">
      </div>
      <div class="form-row">
        <label>パスワード <span style="color:red">*</span></label>
        <div class="pw-input-wrap">
          <input type="password" id="fPw" required placeholder="パスワードを入力">
          <button type="button" class="pw-toggle" onclick="toggleFormPw()" id="formPwToggle" aria-label="パスワードを表示">👁️</button>
        </div>
      </div>
      <div class="form-row">
        <label>備考</label>
        <input type="text" id="fNote" placeholder="メモなど">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
        <button type="submit" class="btn btn-primary" id="modalSubmitBtn">追加</button>
      </div>
    </form>
  </div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'asagiri_pw_manager';

const initialUsers = [
  { id:1,  name:'白神千富美', center:'西明石白神',   type:'FC',   email:'whitegod0829@gmail.com',      pw:'asagiri2026', note:'' },
  { id:2,  name:'藤沢寛子',   center:'藍魚住',       type:'FC',   email:'aiuozumi0111@gmail.com',      pw:'asagiri2026', note:'' },
  { id:3,  name:'家入禮子',   center:'学園東町',     type:'FC',   email:'ieiri888888@gmail.com',       pw:'asagiri2026', note:'' },
  { id:4,  name:'有江健彦',   center:'朝霧ヤマノ',   type:'販社', email:'katsuhiko.arie@gmail.com',    pw:'asagiri2026', note:'管理者' },
  { id:5,  name:'有江啓子',   center:'朝霧ヤマノ',   type:'販社', email:'ya.asagiriten@gmail.com',     pw:'asagiri2026', note:'朝霧店責任者' },
  { id:6,  name:'有江真吾',   center:'朝霧ヤマノ',   type:'販社', email:'asagiriyamano@gmail.com',     pw:'asagiri2026', note:'' },
  { id:7,  name:'伊藤成子',   center:'成子朝霧',     type:'FC',   email:'seiko.i.3124@gmail.com',      pw:'asagiri2026', note:'' },
  { id:21, name:'岩田裕美子', center:'西舞子岩田',   type:'BC',   email:'yumikoiwata212@gmail.com',    pw:'asagiri2026', note:'' },
  { id:22, name:'稲岡ゆかり', center:'西舞子ゆかり', type:'BC',   email:'salonkotori1010@gmail.com',   pw:'asagiri2026', note:'' },
  { id:23, name:'土野麻希子', center:'マキ朝霧',     type:'BC',   email:'makimaki19.0412@gmail.com',   pw:'asagiri2026', note:'' },
  { id:24, name:'森本すずみ', center:'三木すず',     type:'BC',   email:'sue69222@gmail.com',          pw:'asagiri2026', note:'' },
  { id:25, name:'ひろやす',   center:'ヒロ朝霧',     type:'FC',   email:'hiroyasuarie0925@gmail.com',  pw:'asagiri2026', note:'' },
];

// --- localStorage ラッパー ---
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}
function saveData(users) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(users)); } catch(e) {}
}

let users = loadData() || JSON.parse(JSON.stringify(initialUsers));
let currentFilter = 'all';
let visiblePwIds = new Set(); // 表示中のパスワードID
let formPwVisible = false;
let nextId = Math.max(...users.map(u => u.id), 0) + 1;

// --- フィルター ---
function setFilter(type) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.type === type);
  });
  render();
}

// --- 絞り込み ---
function filteredUsers() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  return users.filter(u => {
    const matchType = currentFilter === 'all' || u.type === currentFilter;
    const matchQ = !q || u.name.toLowerCase().includes(q) ||
                   u.center.toLowerCase().includes(q) ||
                   u.email.toLowerCase().includes(q);
    return matchType && matchQ;
  });
}

// --- サマリー ---
function renderSummary() {
  const fc    = users.filter(u => u.type === 'FC').length;
  const bc    = users.filter(u => u.type === 'BC').length;
  const hansha = users.filter(u => u.type === '販社').length;
  document.getElementById('summary').innerHTML = `
    <div class="summary-card"><div class="label">FC</div><div class="count" style="color:#1d4ed8">${fc}</div></div>
    <div class="summary-card"><div class="label">BC</div><div class="count" style="color:#15803d">${bc}</div></div>
    <div class="summary-card"><div class="label">販社</div><div class="count" style="color:#c2410c">${hansha}</div></div>
    <div class="summary-card"><div class="label">合計</div><div class="count">${users.length}</div></div>
  `;
}

// --- バッジ ---
function badge(type) {
  const cls = type === 'FC' ? 'badge-fc' : type === 'BC' ? 'badge-bc' : 'badge-hansha';
  return `<span class="badge ${cls}">${type}</span>`;
}

// --- テーブル描画 ---
function render() {
  renderSummary();
  const list = filteredUsers();
  const tbody = document.getElementById('tbody');
  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">該当するユーザーがいません</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(u => {
    const shown = visiblePwIds.has(u.id);
    const pwDisplay = shown ? escHtml(u.pw) : '●●●●●●●●';
    const eyeIcon = shown ? '🙈' : '👁️';
    const eyeLabel = shown ? 'パスワードを隠す' : 'パスワードを表示';
    return `<tr>
      <td>${escHtml(u.name)}</td>
      <td>${escHtml(u.center)}</td>
      <td>${badge(u.type)}</td>
      <td style="font-size:12px">${escHtml(u.email)}</td>
      <td>
        <div class="pw-cell">
          <span class="pw-text" id="pw-${u.id}">${pwDisplay}</span>
          <button type="button" class="btn-icon" onclick="togglePw(${u.id})" aria-label="${eyeLabel}" title="${eyeLabel}">${eyeIcon}</button>
          <button type="button" class="btn-icon" onclick="copyPw(${u.id})" aria-label="コピー" title="コピー">📋</button>
        </div>
      </td>
      <td style="color:#78716c;font-size:12px">${escHtml(u.note)}</td>
      <td>
        <div class="action-cell">
          <button type="button" class="btn btn-sm btn-secondary" onclick="openEdit(${u.id})">編集</button>
          <button type="button" class="btn btn-sm btn-danger" onclick="deleteUser(${u.id})">削除</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function escHtml(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// --- パスワード表示切替（テーブル） ---
function togglePw(id) {
  if (visiblePwIds.has(id)) {
    visiblePwIds.delete(id);
  } else {
    visiblePwIds.add(id);
  }
  render();
}

// --- パスワードコピー ---
function copyPw(id) {
  const u = users.find(u => u.id === id);
  if (!u) return;
  try {
    navigator.clipboard.writeText(u.pw).then(() => showToast('コピーしました'));
  } catch(e) {
    // fallback
    const el = document.createElement('textarea');
    el.value = u.pw;
    el.style.position = 'fixed';
    el.style.opacity = '0';
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast('コピーしました');
  }
}

// --- モーダル ---
function openModal(user) {
  formPwVisible = false;
  updateFormPwToggle();
  document.getElementById('editId').value = '';
  document.getElementById('fName').value = '';
  document.getElementById('fCenter').value = '';
  document.getElementById('fType').value = 'FC';
  document.getElementById('fEmail').value = '';
  document.getElementById('fPw').value = '';
  document.getElementById('fNote').value = '';
  document.getElementById('fPw').type = 'password';
  document.getElementById('modalTitle').textContent = 'ユーザー追加';
  document.getElementById('modalSubmitBtn').textContent = '追加';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('fName').focus(), 50);
}

function openEdit(id) {
  const u = users.find(u => u.id === id);
  if (!u) return;
  formPwVisible = false;
  updateFormPwToggle();
  document.getElementById('editId').value = u.id;
  document.getElementById('fName').value = u.name;
  document.getElementById('fCenter').value = u.center;
  document.getElementById('fType').value = u.type;
  document.getElementById('fEmail').value = u.email;
  document.getElementById('fPw').value = u.pw;
  document.getElementById('fPw').type = 'password';
  document.getElementById('fNote').value = u.note;
  document.getElementById('modalTitle').textContent = 'ユーザー編集';
  document.getElementById('modalSubmitBtn').textContent = '保存';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function overlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// --- フォームのパスワード表示切替 ---
function toggleFormPw() {
  formPwVisible = !formPwVisible;
  document.getElementById('fPw').type = formPwVisible ? 'text' : 'password';
  updateFormPwToggle();
}
function updateFormPwToggle() {
  const btn = document.getElementById('formPwToggle');
  if (!btn) return;
  btn.textContent = formPwVisible ? '🙈' : '👁️';
  btn.setAttribute('aria-label', formPwVisible ? 'パスワードを隠す' : 'パスワードを表示');
}

// --- 保存 ---
function saveUser(e) {
  e.preventDefault();
  const id = document.getElementById('editId').value;
  const data = {
    name:   document.getElementById('fName').value.trim(),
    center: document.getElementById('fCenter').value.trim(),
    type:   document.getElementById('fType').value,
    email:  document.getElementById('fEmail').value.trim(),
    pw:     document.getElementById('fPw').value,
    note:   document.getElementById('fNote').value.trim(),
  };
  if (id) {
    const idx = users.findIndex(u => u.id === Number(id));
    if (idx !== -1) users[idx] = { ...users[idx], ...data };
    showToast('更新しました');
  } else {
    users.push({ id: nextId++, ...data });
    showToast('追加しました');
  }
  saveData(users);
  closeModal();
  render();
}

// --- 削除 ---
function deleteUser(id) {
  const u = users.find(u => u.id === id);
  if (!u) return;
  if (!confirm(`「${u.name}」を削除してよいですか？`)) return;
  users = users.filter(u => u.id !== id);
  visiblePwIds.delete(id);
  saveData(users);
  showToast('削除しました');
  render();
}

// --- CSV ダウンロード ---
function downloadCSV() {
  const headers = ['担当者名', 'センター名', '種別', 'メールアドレス', 'パスワード', '備考'];
  const rows = users.map(u => [u.name, u.center, u.type, u.email, u.pw, u.note]);
  const csv = [headers, ...rows]
    .map(row => row.map(v => `"${String(v).replace(/"/g, '""')}"`).join(','))
    .join('\r\n');
  const bom = '﻿';
  const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `asagiri_passwords_${dateStr()}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('CSVをダウンロードしました');
}

function dateStr() {
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}

// --- トースト ---
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// --- ESC でモーダルを閉じる ---
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// --- 初期表示 ---
render();
</script>
</body>
</html>
