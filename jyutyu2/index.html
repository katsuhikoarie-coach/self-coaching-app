<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>朝霧ヤマノ FC受注システム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --amber:     #d97706;
  --amber-dk:  #b45309;
  --amber-lt:  #fef3c7;
  --amber-bg:  #fffbeb;
  --stone-50:  #fafaf9;
  --stone-100: #f5f5f4;
  --stone-200: #e7e5e4;
  --stone-400: #a8a29e;
  --stone-500: #78716c;
  --stone-700: #44403c;
  --stone-800: #292524;
  --green:     #16a34a;
  --red:       #dc2626;
  --radius:    14px;
  --shadow:    0 2px 12px rgba(0,0,0,0.09);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--stone-50);
  color: var(--stone-800);
  font-size: 15px;
  overflow-x: hidden;
}

/* ── スクリーン切り替え ─────────────────────────── */
.screen { display: none; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }

/* ── 共通ヘッダー ────────────────────────────────── */
.hdr {
  background: #fff;
  border-bottom: 1px solid var(--stone-200);
  display: flex; align-items: center; gap: 10px;
  padding: 0 14px; height: 54px;
  position: sticky; top: 0; z-index: 50;
  flex-shrink: 0;
}
.hdr-title { font-size: 16px; font-weight: 600; flex: 1; }
.hdr-back {
  background: none; border: none; cursor: pointer;
  color: var(--stone-500); padding: 6px; display: flex; align-items: center;
}
.hdr-back:active { opacity: .6; }

/* ── ボタン ──────────────────────────────────────── */
.btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; padding: 14px;
  border: none; border-radius: var(--radius);
  font-size: 15px; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: opacity .15s, transform .1s;
}
.btn:active { opacity: .8; transform: scale(.98); }
.btn-amber  { background: var(--amber); color: #fff; }
.btn-amber:hover { background: var(--amber-dk); }
.btn-outline { background: #fff; color: var(--stone-700); border: 1.5px solid var(--stone-200); }
.btn-ghost   { background: none; border: none; color: var(--stone-500); font-size: 14px; }
.btn-sm      { padding: 8px 14px; font-size: 13px; width: auto; border-radius: 10px; }

/* ── カード ──────────────────────────────────────── */
.card {
  background: #fff; border: 1px solid var(--stone-200);
  border-radius: var(--radius); padding: 16px;
}

/* ── ページコンテンツ ─────────────────────────────── */
.page { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; }
.page-pb { padding-bottom: 80px; }

/* ── ローディング ────────────────────────────────── */
#screen-loading {
  background: var(--stone-50); display: flex;
  align-items: center; justify-content: center;
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--stone-200);
  border-top-color: var(--amber);
  border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ════════════════════════════════════════
   ログイン画面
   ════════════════════════════════════════ */
#screen-login {
  background: var(--stone-50);
  align-items: center; justify-content: center;
}
.login-box {
  width: 100%; max-width: 360px;
  padding: 24px 20px;
  display: flex; flex-direction: column; gap: 16px;
}
.login-logo {
  text-align: center; margin-bottom: 8px;
}
.login-logo .mark {
  width: 64px; height: 64px; margin: 0 auto 10px;
  background: var(--amber-bg); border: 1.5px solid #fde68a;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 28px;
}
.login-logo h1 { font-size: 22px; font-weight: 700; letter-spacing: .08em; }
.login-logo p  { font-size: 13px; color: var(--amber); font-weight: 500; margin-top: 2px; letter-spacing: .06em; }
.login-card { background: #fff; border: 1px solid var(--stone-200); border-radius: var(--radius); overflow: hidden; }
.login-card-inner { padding: 20px; display: flex; flex-direction: column; gap: 10px; }
.btn-google {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 13px;
  background: #fff; border: 1.5px solid var(--stone-200); border-radius: 12px;
  font-size: 15px; font-weight: 500; color: var(--stone-700);
  cursor: pointer; transition: background .12s;
}
.btn-google:hover { background: var(--stone-100); }
.btn-google:active { transform: scale(.98); }
.divider { display: flex; align-items: center; gap: 10px; }
.divider hr { flex: 1; border: none; border-top: 1px solid var(--stone-200); }
.divider span { font-size: 12px; color: var(--stone-400); }
#login-error { color: var(--red); font-size: 13px; text-align: center; display: none; padding: 8px; }

/* ════════════════════════════════════════
   ホーム画面
   ════════════════════════════════════════ */
.welcome-card {
  background: linear-gradient(135deg, var(--amber-bg), var(--amber-lt));
  border: 1.5px solid #fde68a; border-radius: var(--radius); padding: 16px;
}
.welcome-card .sub { font-size: 12px; color: var(--amber-dk); }
.welcome-card h2   { font-size: 20px; font-weight: 700; margin: 2px 0; }
.welcome-card .fc  { font-size: 13px; color: var(--stone-600, #57534e); }
.actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.action-card {
  background: #fff; border: 1px solid var(--stone-200); border-radius: var(--radius);
  padding: 20px 12px; display: flex; flex-direction: column; align-items: center; gap: 8px;
  cursor: pointer; transition: border-color .15s, box-shadow .15s;
}
.action-card:hover { border-color: var(--amber); box-shadow: var(--shadow); }
.action-card:active { background: var(--stone-100); }
.action-card .icon { font-size: 28px; }
.action-card span  { font-size: 13px; font-weight: 600; }
.section-title { font-size: 12px; font-weight: 700; color: var(--stone-400); letter-spacing: .08em; }
.order-row {
  background: #fff; border: 1px solid var(--stone-200); border-radius: 12px;
  padding: 12px 14px; display: flex; align-items: center; justify-content: space-between;
}
.order-row .meta  { font-size: 12px; color: var(--stone-400); }
.order-row .items { font-size: 12px; color: var(--stone-500); margin-top: 2px; }
.order-row .total { font-weight: 700; color: var(--amber-dk); }
.order-row .total-sub { font-size: 11px; color: var(--stone-400); margin-top: 1px; text-align: right; }
.empty-state { text-align: center; padding: 28px 0; color: var(--stone-400); font-size: 14px; }

/* ════════════════════════════════════════
   商品検索画面
   ════════════════════════════════════════ */
.search-bar {
  position: relative;
}
.search-bar input {
  width: 100%; padding: 10px 14px 10px 38px;
  border: 1.5px solid var(--stone-200); border-radius: 12px;
  font-size: 14px; font-family: inherit; background: var(--stone-100);
  outline: none; transition: border-color .15s, background .15s;
}
.search-bar input:focus { border-color: var(--amber); background: #fff; }
.search-bar .icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--stone-400); }
.category-filter {
  display: flex; gap: 7px; overflow-x: auto; padding-bottom: 2px;
  scrollbar-width: none;
}
.category-filter::-webkit-scrollbar { display: none; }
.cat-btn {
  flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
  border: 1.5px solid var(--stone-200); background: #fff;
  font-size: 13px; font-family: inherit; cursor: pointer; transition: all .12s;
  white-space: nowrap;
}
.cat-btn.active { background: var(--amber); border-color: var(--amber); color: #fff; font-weight: 600; }
.cat-btn:hover:not(.active) { border-color: var(--amber); }
.product-count { font-size: 12px; color: var(--stone-400); }
.product-list { display: flex; flex-direction: column; gap: 8px; }
.product-row {
  background: #fff; border: 1px solid var(--stone-200); border-radius: var(--radius);
  padding: 12px; display: flex; align-items: center; gap: 10px;
}
.product-info { flex: 1; min-width: 0; }
.product-code { font-size: 11px; color: var(--stone-400); font-family: monospace; }
.product-name { font-size: 14px; font-weight: 500; line-height: 1.4; margin: 2px 0; }
.product-vol  { font-size: 11px; color: var(--stone-400); }
.product-price { font-size: 15px; font-weight: 700; color: var(--amber-dk); }
.product-price .tax { font-size: 11px; font-weight: 400; color: var(--stone-400); }
.in-cart { font-size: 11px; color: var(--amber); margin-top: 2px; }
.product-ctrl { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
.qty-ctrl { display: flex; align-items: center; gap: 4px; }
.qty-btn {
  width: 28px; height: 28px; border-radius: 50%;
  border: none; background: var(--stone-100); color: var(--stone-700);
  font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background .12s;
}
.qty-btn:active { background: var(--stone-200); }
.qty-val { width: 28px; text-align: center; font-size: 14px; font-weight: 600; }
.add-btn {
  padding: 7px 12px; border-radius: 10px; border: none;
  font-size: 12px; font-weight: 700; font-family: inherit; cursor: pointer;
  transition: all .15s;
}
.add-btn-normal { background: var(--amber); color: #fff; }
.add-btn-normal:active { background: var(--amber-dk); }
.add-btn-done   { background: var(--green); color: #fff; }
.no-results { text-align: center; padding: 40px 0; color: var(--stone-400); }

/* ════════════════════════════════════════
   カート・確認・完了共通
   ════════════════════════════════════════ */
.cart-item {
  background: #fff; border: 1px solid var(--stone-200); border-radius: var(--radius); padding: 12px;
}
.cart-item-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.cart-item-name { font-size: 14px; font-weight: 500; flex: 1; }
.del-btn {
  background: none; border: none; color: var(--stone-300); cursor: pointer; padding: 2px;
  transition: color .12s;
}
.del-btn:hover { color: var(--red); }
.cart-item-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
.cart-qty-ctrl { display: flex; align-items: center; gap: 6px; }
.cart-qty-input {
  width: 52px; text-align: center; border: 1px solid var(--stone-200); border-radius: 8px;
  padding: 5px; font-size: 14px; font-weight: 600; font-family: inherit; outline: none;
}
.cart-qty-input:focus { border-color: var(--amber); }
.line-total { font-weight: 700; color: var(--amber-dk); }
.line-total .note { font-size: 11px; font-weight: 400; color: var(--stone-400); }
.totals-card { background: #fff; border: 1px solid var(--stone-200); border-radius: var(--radius); padding: 14px; }
.total-row { display: flex; justify-content: space-between; font-size: 14px; color: var(--stone-600, #57534e); padding: 4px 0; }
.total-row.grand { font-size: 17px; font-weight: 700; color: var(--stone-800); border-top: 1px solid var(--stone-200); margin-top: 6px; padding-top: 10px; }
.total-row.grand span:last-child { color: var(--amber-dk); }
.add-more-link { text-align: center; padding: 6px 0; }
.add-more-link a { color: var(--amber); font-size: 14px; font-weight: 500; cursor: pointer; }

/* 備考・チェック */
.note-area {
  width: 100%; border: 1.5px solid var(--stone-200); border-radius: 12px;
  padding: 10px 12px; font-size: 14px; font-family: inherit;
  resize: none; outline: none; transition: border-color .15s;
}
.note-area:focus { border-color: var(--amber); }
.agree-label {
  display: flex; align-items: flex-start; gap: 10px;
  background: #fff; border: 1px solid var(--stone-200); border-radius: var(--radius);
  padding: 14px; cursor: pointer;
}
.agree-label input { width: 18px; height: 18px; margin-top: 1px; accent-color: var(--amber); flex-shrink: 0; }

/* 確認画面 */
.info-rows { display: flex; flex-direction: column; gap: 8px; }
.info-row  { display: flex; gap: 10px; }
.info-lbl  { font-size: 12px; color: var(--stone-400); width: 56px; flex-shrink: 0; padding-top: 1px; }
.info-val  { font-size: 14px; color: var(--stone-700); flex: 1; }
.items-table { background: #fff; border: 1px solid var(--stone-200); border-radius: var(--radius); overflow: hidden; }
.items-table-hdr { background: var(--stone-100); padding: 10px 14px; font-size: 12px; font-weight: 700; color: var(--stone-500); }
.items-table-row { padding: 10px 14px; border-top: 1px solid var(--stone-100); display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.items-table-row .item-info { flex: 1; min-width: 0; }
.items-table-row .item-code { font-size: 11px; color: var(--stone-400); font-family: monospace; }
.items-table-row .item-name { font-size: 13px; line-height: 1.4; margin-top: 1px; }
.items-table-row .item-right { text-align: right; flex-shrink: 0; }
.items-table-row .item-qty  { font-size: 11px; color: var(--stone-400); }
.items-table-row .item-amt  { font-size: 13px; font-weight: 600; }
.items-table-footer { background: var(--stone-100); padding: 10px 14px; font-size: 13px; font-weight: 700; display: flex; justify-content: space-between; border-top: 1.5px solid var(--stone-200); }
.items-table-footer span:last-child { color: var(--amber-dk); }

/* 完了画面 */
.complete-wrap { padding: 32px 16px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
.complete-icon {
  width: 80px; height: 80px; border-radius: 50%;
  background: #dcfce7; border: 2px solid #86efac;
  display: flex; align-items: center; justify-content: center;
  font-size: 36px; color: var(--green);
}
.complete-title { text-align: center; }
.complete-title h1 { font-size: 22px; font-weight: 700; }
.complete-title p  { font-size: 13px; color: var(--stone-500); margin-top: 4px; }
.order-number-card {
  background: #fff; border: 2px solid #fde68a; border-radius: var(--radius);
  padding: 20px; text-align: center; width: 100%; box-shadow: var(--shadow);
}
.order-number-card .label { font-size: 12px; font-weight: 700; color: var(--amber-dk); letter-spacing: .1em; }
.order-number-card .number { font-size: 28px; font-weight: 700; font-family: monospace; letter-spacing: .08em; margin: 6px 0; }
.order-number-card .date   { font-size: 12px; color: var(--stone-400); }
.order-number-card .amount { font-size: 18px; font-weight: 700; color: var(--amber-dk); margin-top: 8px; }
.complete-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; }

/* ── 固定フッター ────────────────────────────────── */
.sticky-footer {
  position: sticky; bottom: 0; background: #fff;
  border-top: 1px solid var(--stone-200); padding: 12px 14px;
  display: flex; flex-direction: column; gap: 6px; flex-shrink: 0;
  z-index: 30;
}
.footer-summary { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
.footer-summary .total { font-weight: 700; color: var(--stone-700); }
.footer-row { display: flex; gap: 8px; }
.footer-row .btn { flex: 1; }

/* カートバッジ */
.cart-badge-wrap { position: relative; }
.cart-badge {
  position: absolute; top: -5px; right: -6px;
  background: var(--amber); color: #fff;
  font-size: 10px; font-weight: 700;
  width: 18px; height: 18px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  line-height: 1;
}
.cart-icon-btn {
  background: none; border: none; cursor: pointer; padding: 6px;
  display: flex; align-items: center; color: var(--stone-500);
}

/* トースト */
#toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: var(--stone-800); color: #fff;
  padding: 10px 20px; border-radius: 20px; font-size: 13px;
  opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 999;
  white-space: nowrap;
}
#toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- ── ローディング ──────────────────────────── -->
<!-- asagiri_salesと同じく display:none で開始、必要なときだけ表示 -->
<div id="screen-loading" class="screen" style="display:none;">
  <div class="spinner"></div>
</div>

<!-- ── ログイン ──────────────────────────────── -->
<!-- asagiri_salesと同じく最初から display:flex で表示 -->
<div id="screen-login" class="screen" style="display:flex;">
  <div class="login-box">
    <div class="login-logo">
      <div class="mark">🌿</div>
      <h1>朝霧ヤマノ</h1>
      <p>FC 受注システム</p>
    </div>
    <div class="login-card">
      <div class="login-card-inner">
        <button id="login-btn" class="btn-google" onclick="doLogin()">
          <svg width="20" height="20" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Googleでログイン
        </button>
        <p id="login-error"></p>
      </div>
      <div style="padding: 10px 20px 16px; background: var(--stone-100); font-size: 12px; color: var(--stone-400); text-align: center;">
        ※ GmailアドレスでFCご担当者がログインできます
      </div>
    </div>
  </div>
</div>

<!-- ── ホーム ─────────────────────────────────── -->
<div id="screen-home" class="screen">
  <div class="hdr">
    <span style="font-size:18px;">🌿</span>
    <span class="hdr-title" style="font-size:14px; letter-spacing:.05em;">朝霧ヤマノ FC受注</span>
    <button class="btn-ghost btn-sm" onclick="doSignOut()">ログアウト</button>
  </div>
  <div class="page">
    <div class="welcome-card">
      <div class="sub">ようこそ</div>
      <h2 id="home-contact"></h2>
      <div class="fc" id="home-fcname"></div>
    </div>
    <div class="actions-grid">
      <div class="action-card" onclick="showProducts()">
        <div class="icon">📦</div>
        <span>新規注文</span>
      </div>
      <div class="action-card" onclick="showOrderHistory()">
        <div class="icon">📋</div>
        <span>注文履歴</span>
      </div>
    </div>
    <div class="section-title">最近の注文</div>
    <div id="home-orders">
      <div class="empty-state">読み込み中…</div>
    </div>
  </div>
</div>

<!-- ── 商品選択 ──────────────────────────────── -->
<div id="screen-products" class="screen">
  <div class="hdr">
    <button class="hdr-back" onclick="showScreen('home')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <span class="hdr-title">商品を選ぶ</span>
    <div class="cart-badge-wrap">
      <button class="cart-icon-btn" onclick="showCart()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      </button>
      <div class="cart-badge" id="cart-badge" style="display:none;">0</div>
    </div>
  </div>
  <!-- 検索・フィルター（ページ内固定） -->
  <div style="padding: 10px 14px 0; background: var(--stone-50); flex-shrink: 0;">
    <div class="search-bar" style="margin-bottom: 8px;">
      <span class="icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </span>
      <input type="search" id="search-input" placeholder="商品名・コードで検索" oninput="renderProducts()">
    </div>
    <div class="category-filter" id="cat-filter"></div>
  </div>
  <!-- 商品一覧 -->
  <div class="page page-pb" id="product-list-wrap" style="padding-top: 10px;">
    <div class="product-count" id="product-count"></div>
    <div class="product-list" id="product-list"></div>
  </div>
  <!-- カートへ進む（商品あるとき） -->
  <div class="sticky-footer" id="products-footer" style="display:none;">
    <div class="footer-summary">

// PHP API ヘルパー（asagiri_salesと同じパターン）
// ══════════════════════════════════════════
const API_BASE = 'api';
async function getToken() {
  const user = fbAuth.currentUser;
  if (!user) return null;
  return await user.getIdToken(false);
}
async function apiGet(endpoint) {
  const token = await getToken();
  const res = await fetch(`${API_BASE}/${endpoint}`, {
    headers: { 'Authorization': 'Bearer ' + token }
  });
  if (!res.ok) {
    let err = '';
    try { err = (await res.json()).error || ''; } catch(e) {}
    throw new Error(err || `APIエラー ${res.status}`);
  }
  return res.json();
}
async function apiPost(endpoint, data) {
  const token = await getToken();
  const res = await fetch(`${API_BASE}/${endpoint}`, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  if (!res.ok) {
    let err = '';
    try { err = (await res.json()).error || ''; } catch(e) {}
    throw new Error(err || `APIエラー ${res.status}`);
  }
  return res.json();
}

// CSVダウンロード（Shift-JIS / Excel対応）
// ══════════════════════════════════════════
function downloadOrdersCsv() {
  if (!orderHistory.length) {
    alert('ダウンロードする注文履歴がありません');
    return;
  }

  // ヘッダー行
  const rows = [
    ['受注番号', '日付', 'FC名', '商品コード', '商品名', '単価', '個数', '金額', '合計(税込)', '備考']
  ];

  // 明細単位で1行
  orderHistory.forEach(o => {
    o.items.forEach(it => {
      rows.push([
        o.id,
        o.order_date,
        o.fc_name || '',
        it.code,
        it.name,
        it.price,
        it.qty,
        it.amount,
        o.total,
        o.note || ''
      ]);
    });
  });

  // CSV文字列（カンマ・改行・ダブルクォートを含む値はクォートで囲む）
  const csvStr = rows.map(row =>
    row.map(v => {
      const s = String(v ?? '');
      return (s.includes(',') || s.includes('"') || s.includes('\n') || s.includes('\r'))
        ? '"' + s.replace(/"/g, '""') + '"'
        : s;
    }).join(',')
  ).join('\r\n');

  // Shift-JIS 変換
  const unicodeArray = Encoding.stringToCode(csvStr);
  const sjisArray    = Encoding.convert(unicodeArray, { to: 'SJIS', from: 'UNICODE' });
  const blob = new Blob([new Uint8Array(sjisArray)], { type: 'text/csv; charset=shift-jis' });

  // ファイル名: orders_YYYYMMDD.csv
  const today = new Date().toISOString().slice(0, 10).replace(/-/g, '');
  const url   = URL.createObjectURL(blob);
  const a     = document.createElement('a');
  a.href      = url;
  a.download  = `orders_${today}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

            <span class="qty-val" id="iqty-${p.code}">${qty}</span>
            <button class="qty-btn" onclick="changeInputQty('${p.code}',1)">＋</button>

        </div>
      </div>
    `;
  }).join('');

  updateProductsFooter();
}

function changeInputQty(code, delta) {
  inputQtyMap[code] = Math.max(1, (inputQtyMap[code] ?? 1) + delta);
  const el = document.getElementById('iqty-' + code);
  if (el) el.textContent = inputQtyMap[code];
}

function addToCart(code) {
  const p   = PRODUCTS.find(p => p.code === code);
  const qty = inputQtyMap[code] ?? 1;
  const idx = cart.findIndex(c => c.product.code === code);
  if (idx >= 0) cart[idx].qty += qty;
  else           cart.push({ product: p, qty });

  // ボタン一時変更
  const btn = document.getElementById('addbtn-' + code);
  if (btn) {
    btn.textContent = '✓ 追加';
    btn.className = 'add-btn add-btn-done';
    setTimeout(() => {
      btn.textContent = 'カートへ';
      btn.className = 'add-btn add-btn-normal';
      renderProducts();
    }, 1200);
  }
  updateCartBadge();
  updateProductsFooter();
  showToast(`${p.name.slice(0, 16)}… をカートに追加`);
}

function updateCartBadge() {
  const count = cart.reduce((s, c) => s + c.qty, 0);

}

function updateProductsFooter() {

}

function removeFromCart(code) {
  cart = cart.filter(c => c.product.code !== code);
  renderCart();
  updateCartBadge();
  updateProductsFooter();
}

function updateCartQty(code, qty) {
  if (qty <= 0) { removeFromCart(code); return; }
  const idx = cart.findIndex(c => c.product.code === code);
  if (idx >= 0) cart[idx].qty = qty;
  renderCart();
  updateCartBadge();
  updateProductsFooter();
}

  const note = document.getElementById('order-note')?.value || '';

  const payload = {
    items: cart.map(c => ({
      code:  c.product.code,
      name:  c.product.name,
      price: c.product.price,
      qty:   c.qty,
      tax:   c.product.tax,
    })),
    note,
    subtotal,
    tax_total: taxTotal,
    total:     grandTotal,
  };

  try {
    const res = await apiPost('orders.php', payload);
    lastOrderId = res.id;
    cart = [];
    updateCartBadge();
    // 履歴を再取得
    try { orderHistory = await apiGet('orders.php'); } catch(e) {}
    renderCompleteScreen();
    showScreen('complete');
  } catch(e) {
    alert('注文の送信に失敗しました。\n' + (e.message || ''));
    btn.disabled = false;
    btn.textContent = '注文を確定する';
    toggleSubmitBtn();
  }
}

// ══════════════════════════════════════════
// 完了画面
// ══════════════════════════════════════════
function renderCompleteScreen() {
  const { grandTotal } = calcTotalsFromHistory();
  const today = new Date().toLocaleDateString('ja-JP');
  const body  = document.getElementById('complete-body');
  body.innerHTML = `
    <div class="complete-icon">✓</div>
    <div class="complete-title">
      <h1>注文が完了しました</h1>
      <p>ご注文ありがとうございます</p>
    </div>
    <div class="order-number-card">
      <div class="label">受 注 番 号</div>
      <div class="number">${lastOrderId}</div>
      <div class="date">${today} ／ ${currentUser.fc_name}</div>
      ${orderHistory.length ? `<div class="amount">¥${fmt(orderHistory[0].total)} <span style="font-size:13px; font-weight:400; color:var(--stone-400);">（税込）</span></div>` : ''}
    </div>
    <div class="complete-actions">
      <button class="btn btn-amber" onclick="showProducts()">新規注文</button>
      <button class="btn btn-outline" onclick="showOrderHistory()">注文履歴を見る</button>
      <button class="btn btn-ghost" onclick="showScreen('home')">ホームに戻る</button>
    </div>
  `;
}

function calcTotalsFromHistory() {
  if (orderHistory.length) return { grandTotal: orderHistory[0].total };
  return { grandTotal: 0 };
}

// ══════════════════════════════════════════
// 集計ユーティリティ
// ══════════════════════════════════════════
function calcTotals() {
  let subtotal = 0, taxTotal = 0;
  cart.forEach(c => {
    const line = c.product.price * c.qty;
    subtotal += line;
    taxTotal += Math.floor(line * c.product.tax);
  });
  return { subtotal, taxTotal, grandTotal: subtotal + taxTotal };
}

function cartGrandTotal() { return calcTotals().grandTotal; }

function fmt(n) {
  return Number(n).toLocaleString('ja-JP');
}

// ══════════════════════════════════════════
// トースト通知
// ══════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// ══════════════════════════════════════════
// 画面遷移ラッパー（render + showScreen を明示的にセット）
// window.showScreen オーバーライドは使わない（onAuthStateChanged と競合するため）
// ══════════════════════════════════════════
function showCart() {
  renderCart();
  showScreen('cart');
}
function showConfirm() {
  renderConfirm();
  showScreen('confirm');
}
</script>
</body>
</html>
